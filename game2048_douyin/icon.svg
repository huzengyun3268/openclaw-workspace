<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="tile2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eee4da"/>
      <stop offset="100%" style="stop-color:#cdc1b4"/>
    </linearGradient>
    <linearGradient id="tile8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2b179"/>
      <stop offset="100%" style="stop-color:#e59550"/>
    </linearGradient>
    <linearGradient id="tile64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f65e3b"/>
      <stop offset="100%" style="stop-color:#e53e1a"/>
    </linearGradient>
    <linearGradient id="tile256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#edcc61"/>
      <stop offset="100%" style="stop-color:#e5c23f"/>
    </linearGradient>
    <linearGradient id="tile2048" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#edc22e"/>
      <stop offset="100%" style="stop-color:#d4a810"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Game board -->
  <rect x="40" y="40" width="432" height="432" rx="30" fill="#0f3460" opacity="0.8"/>

  <!-- Row 1 -->
  <rect x="60" y="60" width="95" height="95" rx="16" fill="url(#tile2)"/>
  <rect x="165" y="60" width="95" height="95" rx="16" fill="url(#tile2)"/>
  <rect x="270" y="60" width="95" height="95" rx="16" fill="url(#tile8)"/>
  <rect x="375" y="60" width="95" height="95" rx="16" fill="#16213e"/>

  <!-- Row 2 -->
  <rect x="60" y="165" width="95" height="95" rx="16" fill="url(#tile8)"/>
  <rect x="165" y="165" width="95" height="95" rx="16" fill="url(#tile64)"/>
  <rect x="270" y="165" width="95" height="95" rx="16" fill="#16213e"/>
  <rect x="375" y="165" width="95" height="95" rx="16" fill="url(#tile64)"/>

  <!-- Row 3 -->
  <rect x="60" y="270" width="95" height="95" rx="16" fill="#16213e"/>
  <rect x="165" y="270" width="95" height="95" rx="16" fill="url(#tile256)"/>
  <rect x="270" y="270" width="95" height="95" rx="16" fill="url(#tile256)"/>
  <rect x="375" y="270" width="95" height="95" rx="16" fill="url(#tile2048)" filter="url(#glow)"/>

  <!-- Row 4 -->
  <rect x="60" y="375" width="95" height="95" rx="16" fill="url(#tile8)"/>
  <rect x="165" y="375" width="95" height="95" rx="16" fill="#16213e"/>
  <rect x="270" y="375" width="95" height="95" rx="16" fill="url(#tile2)"/>
  <rect x="375" y="375" width="95" height="95" rx="16" fill="url(#tile256)"/>

  <!-- Numbers Row 1 -->
  <text x="107" y="118" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#776e65" text-anchor="middle">2</text>
  <text x="212" y="118" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#776e65" text-anchor="middle">2</text>
  <text x="317" y="118" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">8</text>

  <!-- Numbers Row 2 -->
  <text x="107" y="223" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">8</text>
  <text x="212" y="223" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">64</text>
  <text x="422" y="223" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">64</text>

  <!-- Numbers Row 3 -->
  <text x="212" y="328" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">256</text>
  <text x="317" y="328" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">256</text>
  <text x="422" y="328" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#glow)">2048</text>

  <!-- Numbers Row 4 -->
  <text x="107" y="433" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">8</text>
  <text x="317" y="433" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#776e65" text-anchor="middle">2</text>
  <text x="422" y="433" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">256</text>

  <!-- Sparkle decorations -->
  <circle cx="420" cy="50" r="6" fill="#f79711" opacity="0.9"/>
  <circle cx="450" cy="70" r="4" fill="#f79711" opacity="0.6"/>
  <circle cx="60" cy="480" r="5" fill="#f79711" opacity="0.7"/>
</svg>
