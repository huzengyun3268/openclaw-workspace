<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048 Number Merge - Puzzle Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #fff;
    overflow: hidden;
  }
  .title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #f79711, #f95306);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
  }
  .score-bar {
    display: flex;
    gap: 30px;
    margin-bottom: 15px;
    font-size: 14px;
    color: #aaa;
  }
  .score-bar span { color: #f79711; font-weight: bold; font-size: 18px; }
  .game-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    background: #16213e;
    padding: 12px;
    border-radius: 16px;
    border: 2px solid #0f3460;
    width: 340px;
    height: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    touch-action: none;
  }
  .cell {
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    transition: all 0.12s ease;
    cursor: pointer;
  }
  .cell-0    { background: #1a1a2e; color: transparent; }
  .cell-2    { background: #eee4da; color: #776e65; font-size: 32px; }
  .cell-4    { background: #ede0c8; color: #776e65; font-size: 32px; }
  .cell-8    { background: #f2b179; color: #fff; font-size: 32px; }
  .cell-16   { background: #63; color:f595 #fff; font-size: 30px; }
  .cell-32   { background: #f67c5f; color: #fff; font-size: 30px; }
  .cell-64   { background: #f65e3b; color: #fff; font-size: 30px; }
  .cell-128  { background: #edcf72; color: #fff; font-size: 28px; }
  .cell-256  { background: #edcc61; color: #fff; font-size: 28px; }
  .cell-512  { background: #edc850; color: #fff; font-size: 28px; }
  .cell-1024 { background: #edc53f; color: #fff; font-size: 22px; }
  .cell-2048 { background: #edc22e; color: #fff; font-size: 22px; box-shadow: 0 0 20px #f3d96b; }
  .cell-super { background: linear-gradient(135deg, #f79711, #f95306); color: #fff; font-size: 18px; box-shadow: 0 0 25px #f79711aa; }
  .new-tile {
    animation: popIn 0.15s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .btn-row {
    display: flex;
    gap: 15px;
    margin-top: 20px;
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-restart {
    background: linear-gradient(135deg, #f79711, #f95306);
    color: #fff;
  }
  .btn-share {
    background: #07c160;
    color: #fff;
  }
  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.97); }
  .best { color: #f79711; font-size: 14px; margin-top: 8px; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }
  .overlay.show { display: flex; }
  .overlay-title {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .overlay-title.win { color: #f79711; }
  .overlay-title.lose { color: #f95306; }
  .overlay-sub { color: #ccc; margin-bottom: 25px; font-size: 16px; }
  .overlay-score { font-size: 22px; color: #f79711; margin-bottom: 20px; }

  /* 广告区域 */
  .ad-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(180deg, transparent, #0a0a1e);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
  }
  .ad-hint {
    font-size: 12px;
    color: #555;
    text-align: center;
  }

  /* 分享提示 */
  .share-tip {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #07c160;
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 200;
    display: none;
    animation: fadeIn 0.3s;
  }
  .share-tip.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="title">数字合成 2048</div>
<div class="score-bar">
  得分：<span id="score">0</span>
  &nbsp;&nbsp; 历史最高：<span id="best">0</span>
</div>

<div class="game-board" id="board"></div>

<div class="btn-row">
  <button class="btn btn-restart" onclick="init()">重新开始</button>
  <button class="btn btn-share" onclick="shareGame()">分享游戏</button>
</div>

<div class="best" id="tip">👆 方向键或滑动屏幕移动方块</div>

<!-- 结束弹窗 -->
<div class="overlay" id="overlay">
  <div class="overlay-title" id="overlay-title">游戏结束</div>
  <div class="overlay-sub" id="overlay-sub">没有可移动的位置了</div>
  <div class="overlay-score" id="overlay-score"></div>
  <button class="btn btn-restart" onclick="init()">再来一局</button>
</div>

<!-- 分享提示 -->
<div class="share-tip" id="shareTip">📋 链接已复制，去分享吧！</div>

<script>
const SIZE = 4;
let grid = [], score = 0, best = 0, isAnimating = false;

function init() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0;
  document.getElementById('overlay').classList.remove('show');
  addRandomTile();
  addRandomTile();
  render();
  updateScore();
}

function addRandomTile() {
  let empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return;
  let [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render(newTiles = []) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      let v = grid[r][c];
      let div = document.createElement('div');
      div.className = 'cell cell-' + (v > 4096 ? 'super' : v);
      div.textContent = v || '';
      // 标记新生成的tile做动画
      if (newTiles.some(t => t[0] === r && t[1] === c)) {
        div.classList.add('new-tile');
      }
      board.appendChild(div);
    }
  }
}

function updateScore() {
  document.getElementById('score').textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('2048best', best);
    document.getElementById('best').textContent = best;
  }
}

// 键盘和触摸支持
let startX, startY;
document.addEventListener('keydown', e => {
  if (isAnimating) return;
  let dir = {ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right'}[e.key];
  if (dir) { e.preventDefault(); slide(dir); }
});

document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive: true});
document.addEventListener('touchend', e => {
  if (isAnimating) return;
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) slide(dx > 0 ? 'right' : 'left');
  else slide(dy > 0 ? 'down' : 'up');
}, {passive: true});

function getLine(row, col, dir) {
  // 返回一行/列的格子值
  let line = [];
  for (let i = 0; i < SIZE; i++) {
    let [r, c] = [row + (dir==='down'?i:dir==='up'?-i:0), col + (dir==='right'?i:dir==='left'?-i:0)];
    if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) line.push(grid[r][c]);
  }
  return line;
}

function slide(dir) {
  let moved = false;
  let newTiles = [];
  let vectors = {up:[-1,0], down:[1,0], left:[0,-1], right:[0,1]};
  let [dr, dc] = vectors[dir];

  // 按顺序遍历
  let rowOrder = dir==='down' ? [3,2,1,0] : [0,1,2,3];
  let colOrder = dir==='right' ? [3,2,1,0] : [0,1,2,3];

  for (let row of rowOrder) {
    for (let col of colOrder) {
      if (grid[row][col] === 0) continue;
      let v = grid[row][col];
      let nr = row, nc = col;
      while (true) {
        let tr = nr + dr, tc = nc + dc;
        if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
        if (grid[tr][tc] === 0) { nr = tr; nc = tc; }
        else if (grid[tr][tc] === v && !(nr===tr&&nc===tc)) { nr = tr; nc = tc; break; }
        else break;
      }
      if (nr !== row || nc !== col) {
        if (grid[nr][nc] === v) {
          grid[nr][nc] = v * 2;
          score += v * 2;
          grid[row][col] = 0;
          if (v * 2 === 2048) setTimeout(() => showOverlay(true), 300);
        } else {
          grid[nr][nc] = v;
          grid[row][col] = 0;
        }
        moved = true;
      }
    }
  }

  if (moved) {
    isAnimating = true;
    addRandomTile();
    render();
    updateScore();
    setTimeout(() => { isAnimating = false; checkGameOver(); }, 150);
  }
}

function checkGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) return;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (r < SIZE-1 && grid[r][c] === grid[r+1][c]) return;
      if (c < SIZE-1 && grid[r][c] === grid[r][c+1]) return;
  showOverlay(false);
}

function showOverlay(win) {
  document.getElementById('overlay-title').textContent = win ? '🎉 2048达成！' : '游戏结束';
  document.getElementById('overlay-title').className = 'overlay-title ' + (win ? 'win' : 'lose');
  document.getElementById('overlay-sub').textContent = win ? '太厉害了，再挑战更高分！' : '没有可移动的位置了';
  document.getElementById('overlay-score').textContent = '本局得分：' + score;
  document.getElementById('overlay').classList.add('show');
}

function shareGame() {
  let text = `我在「数字合成2048」游戏中得到了 ${score} 分！历史最高 ${best} 分！一起来挑战吧 🎮👉`;
  if (navigator.share) {
    navigator.share({ title: '数字合成2048', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      let tip = document.getElementById('shareTip');
      tip.classList.add('show');
      setTimeout(() => tip.classList.remove('show'), 2500);
    });
  }
}

// 启动
best = parseInt(localStorage.getItem('2048best') || '0');
document.getElementById('best').textContent = best;
init();
</script>
</body>
</html>
